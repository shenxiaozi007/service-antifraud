name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            # 1. 定义项目根目录
            BASE_DIR="/var/www/service-antifraud"
            LARADOCK_DIR="/var/www/laradock"
            
            # 2. 同步代码
            cd $BASE_DIR
            git fetch --all
            
            # 获取更新前后的 composer.json / composer.lock 差异状态
            COMPOSER_CHANGED=$(git diff --name-only HEAD origin/master | grep -E 'composer\.(json|lock)$' || true)
            
            git reset --hard origin/master

            # 3. 如果 composer 有变动，或 vendor/autoload.php 缺失，则安装依赖
            PROJECTS=(
              "www/service.antifraud.local.com"
              "www/service.storage.company.com"
            )

            cd $LARADOCK_DIR

            for PROJECT in "${PROJECTS[@]}"; do
              if [ -n "$COMPOSER_CHANGED" ] || [ ! -f "$BASE_DIR/$PROJECT/vendor/autoload.php" ]; then
                echo "开始安装依赖: $PROJECT"
                docker-compose exec -T -e COMPOSER_MEMORY_LIMIT=-1 workspace \
                  composer install --working-dir=/var/www/service-antifraud/$PROJECT \
                  --no-dev --optimize-autoloader
              else
                echo "依赖无变化且 vendor 已存在，跳过: $PROJECT"
              fi
            done
            
            # 4. 启动/更新本机轻量 ASR 服务
            cd $BASE_DIR
            docker build -f docs/docker/asr/Dockerfile -t service-antifraud-asr:latest .
            docker rm -f service-antifraud-asr || true

            cd $LARADOCK_DIR
            PHP_FPM_CONTAINER=$(docker-compose ps -q php-fpm)
            if [ -n "$PHP_FPM_CONTAINER" ]; then
              PHP_FPM_NETWORKS=$(docker inspect -f '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' "$PHP_FPM_CONTAINER")
              DOCKER_NETWORK=$(printf '%s\n' "$PHP_FPM_NETWORKS" | head -n 1)
            else
              PHP_FPM_NETWORKS=""
              DOCKER_NETWORK=""
            fi

            if [ -z "$DOCKER_NETWORK" ]; then
              DOCKER_NETWORK=bridge
            fi

            docker run -d \
              --name service-antifraud-asr \
              --restart unless-stopped \
              --network "$DOCKER_NETWORK" \
              --network-alias service-antifraud-asr \
              -e ASR_MODEL_SIZE="${ASR_MODEL_SIZE:-tiny}" \
              -e ASR_DEVICE=cpu \
              -e ASR_COMPUTE_TYPE=int8 \
              -e ASR_CPU_THREADS="${ASR_CPU_THREADS:-1}" \
              -v service_antifraud_asr_models:/models \
              service-antifraud-asr:latest

            if [ -n "$PHP_FPM_NETWORKS" ]; then
              for NETWORK in $PHP_FPM_NETWORKS; do
                if [ "$NETWORK" != "$DOCKER_NETWORK" ]; then
                  docker network connect --alias service-antifraud-asr "$NETWORK" service-antifraud-asr || true
                fi
              done
            fi

            # 5. 确保反诈服务可通过 Docker 网络访问 ASR
            ANT_ENV="$BASE_DIR/www/service.antifraud.local.com/.env"
            if [ -f "$ANT_ENV" ]; then
              if grep -q '^ASR_SERVICE_URL=' "$ANT_ENV"; then
                sed -i 's#^ASR_SERVICE_URL=.*#ASR_SERVICE_URL=http://service-antifraud-asr:8000#' "$ANT_ENV"
              else
                printf '\nASR_SERVICE_URL=http://service-antifraud-asr:8000\nASR_TIMEOUT=120\nASR_LANGUAGE=zh\nASR_MODEL_SIZE=tiny\nASR_CPU_THREADS=1\n' >> "$ANT_ENV"
              fi
            fi

            # 6. 重启 PHP-FPM 与队列 worker，使新配置和新代码生效
            cd $LARADOCK_DIR
            docker-compose restart php-fpm
            docker-compose restart php-worker || true
