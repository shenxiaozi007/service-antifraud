services:
  app:
    build:
      context: ../../..
      dockerfile: docs/docker/backend/Dockerfile
    restart: unless-stopped
    volumes:
      - ../../../www/service.antifraud.local.com/.env:/var/www/service.antifraud.local.com/.env:ro
      - ../../../www/service.storage.company.com/.env:/var/www/service.storage.company.com/.env:ro
      - antifraud_storage:/var/www/service.antifraud.local.com/storage
      - common_storage:/var/www/service.storage.company.com/storage
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-80}:80"
    volumes:
      - ../../../www/service.antifraud.local.com/public:/var/www/service.antifraud.local.com/public:ro
      - ../../../www/service.storage.company.com/public:/var/www/service.storage.company.com/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  antifraud-worker:
    build:
      context: ../../..
      dockerfile: docs/docker/backend/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/service.antifraud.local.com
    command: php artisan queue:work --tries=3 --timeout=300
    volumes:
      - ../../../www/service.antifraud.local.com/.env:/var/www/service.antifraud.local.com/.env:ro
      - antifraud_storage:/var/www/service.antifraud.local.com/storage
    depends_on:
      - mysql
      - redis

  common-worker:
    build:
      context: ../../..
      dockerfile: docs/docker/backend/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/service.storage.company.com
    command: php artisan queue:work --tries=3 --timeout=300
    volumes:
      - ../../../www/service.storage.company.com/.env:/var/www/service.storage.company.com/.env:ro
      - common_storage:/var/www/service.storage.company.com/storage
    depends_on:
      - mysql
      - redis

  mysql:
    image: "${MYSQL_IMAGE:-mysql:8.0}"
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-service_antifraud}"
      MYSQL_USER: "${MYSQL_USER:-guardian_max}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-change-me}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-root-password}"
      COMMON_MYSQL_DATABASE: "${COMMON_MYSQL_DATABASE:-service_common}"
      COMMON_MYSQL_USER: "${COMMON_MYSQL_USER:-common_service}"
      COMMON_MYSQL_PASSWORD: "${COMMON_MYSQL_PASSWORD:-change-me}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/01-create-databases.sh:/docker-entrypoint-initdb.d/01-create-databases.sh:ro

  redis:
    image: "${REDIS_IMAGE:-redis:8-alpine}"
    restart: unless-stopped
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-server --requirepass "$$REDIS_PASSWORD"; else redis-server; fi'
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
  antifraud_storage:
  common_storage:
