services:
  app:
    build:
      context: ../../..
      dockerfile: docs/docker/backend/Dockerfile
    image: guardian-max-api:latest
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-guardian-max}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://api.188144.xyz}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_SLACK_WEBHOOK_URL: ${LOG_SLACK_WEBHOOK_URL:-}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-service_antifraud}
      DB_USERNAME: ${DB_USERNAME:-guardian_max}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://188144.xyz,https://www.188144.xyz,https://admin.188144.xyz}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
      CLOUDFLARE_R2_BUCKET: ${CLOUDFLARE_R2_BUCKET:-guardian-max}
      CLOUDFLARE_R2_PUBLIC_URL: ${CLOUDFLARE_R2_PUBLIC_URL:-https://assets.188144.xyz}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-}
      ASR_PROVIDER: ${ASR_PROVIDER:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - guardian_max

  nginx:
    build:
      context: ../../..
      dockerfile: docs/docker/backend/nginx/Dockerfile
    image: guardian-max-api-nginx:latest
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${API_HTTP_PORT:-80}:80"
    volumes:
      - app_storage:/var/www/html/storage:ro
    networks:
      - guardian_max

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-service_antifraud}
      MYSQL_USER: ${MYSQL_USER:-guardian_max}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - guardian_max

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - redis_data:/data
    networks:
      - guardian_max

networks:
  guardian_max:
    driver: bridge

volumes:
  app_storage:
  mysql_data:
  redis_data:
