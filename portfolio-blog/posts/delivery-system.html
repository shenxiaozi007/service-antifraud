        <h1>研发规范不是文档</h1>
        <p class="post-meta">整理时间：2026-05-16 / 来源：团队研发规范体系</p>
        <p>
          规范的价值不在于写得完整，而在于它能不能进入开发者每天的动作：怎么拉分支、怎么提交、怎么拆层、怎么提测、怎么上线。
        </p>
        <h2>可执行接口</h2>
        <ul>
          <li>分支映射环境，降低发布混乱。</li>
          <li>Controller / Business / DAO 拆清职责边界。</li>
          <li>lint、type-check、test、build 前置到合并之前。</li>
        </ul>
      </article>
