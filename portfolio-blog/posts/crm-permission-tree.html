        <h1>CRM 权限树设计</h1>
        <p class="post-meta">整理时间：2026-05-16 / 来源：云实 CRM 知识库切片</p>
        <p>
          CRM 后台权限不能只停留在“能不能看页面”。真正可落地的模型，需要同时控制菜单可见性、动作可执行性和数据可访问范围。
        </p>
        <h2>三层权限</h2>
        <ul>
          <li><strong>菜单权限</strong>：控制用户能否看到客户、订单、报表等模块。</li>
          <li><strong>按钮权限</strong>：控制新增、编辑、删除、导入、导出、审核、改派等动作。</li>
          <li><strong>数据范围</strong>：控制本人、团队、部门、全部、外部团队等可访问边界。</li>
        </ul>
      </article>
